<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 1;
        var locationInfo = window.location;
        var basePath = locationInfo.pathname
          .split("/")
          .slice(0, 1 + pathSegmentsToKeep)
          .join("/");

        locationInfo.replace(
          locationInfo.protocol +
            "//" +
            locationInfo.hostname +
            (locationInfo.port ? ":" + locationInfo.port : "") +
            basePath +
            "/?redirect=" +
            encodeURIComponent(
              locationInfo.pathname + locationInfo.search + locationInfo.hash
            )
        );
      })();
    </script>
  </head>
  <body></body>
</html>
